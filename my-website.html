<html lang="en">
  <head>
    <title>My first Website</title>
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="https://static.vecteezy.com/system/resources/thumbnails/024/553/534/small/lion-head-logo-mascot-wildlife-animal-illustration-generative-ai-png.png"
    />

    <link rel="stylesheet" type="text/css" href="mystyle.css" />

    <style>
      p {
        color: red;
        font-weight: 900;
        font-size: 22px;
        text-transform: uppercase;
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: black;
      }
    </style>
  </head>

  <body>
    <!-- 
    shortcut-icon: favicon, website icon, tab icon, bookmark icon, address bar icon.
    <link rel="shortcut icon" type="image/x-icon" href="image sourse" />
     -->

    <!-- css link: link external css
      <link rel="stylesheet" type="text/css" href=" css srouce/location " />
       -->

    <!-- 
    1. Inline CSS: style inside the tag
    2. Internal CSS: style inside the head tag (style tag)
    3. External CSS: style in an external file (mystyle.css) (link tag)

    
    heading
    paragraph
    div
    span
    section
    table


    quotation '' = Single quotation
    "" = Double quotation -->

    <!-- color: red -->
    <!-- 1. Color: only text color -->
    <!-- 2. Font-Weight: make text thicker or lighter. -->
    <!-- 3. Font-size: make text bigger or smaller -->
    <!-- 4. Font-Case: make text capital or small. (text-transform) -->
    <!-- i. capitalize: make first latter of each word capital. ii. uppercase: make
    all letters capital. iii. lowercase: make all letters small. -->

    <!-- 5. font-family: changes font style and font family. -->
    <!-- 6. text-align: aligns text (left, right, center, justify) -->

    <!-- 6. background-color: changes background color -->

    <!-- Inline Style -->
    <h1
      style="
        color: orange;
        font-weight: 900;
        font-size: 22px;
        text-transform: uppercase;
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: green;
      "
    >
      Heading 1
    </h1>

    <!-- Internal Style -->
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
    <p>Paragraph 3</p>

    <span>This is FROM EXTERNAL CSS</span>
  </body>
</html>

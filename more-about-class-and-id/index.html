<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- EXTERNAL CSS: to use external css, create a separate "style.css" file and then link it to html -->
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <!-- To use class: write class="" inside a tag -->
    <div class="my-class">
      <span>This is a span.</span>
    </div>

    <br />

    <div class="my-class our-class">
      <p>This is a paragraph.</p>
    </div>

    <br />

    <!-- To use id: write id="" inside a tag -->
    <!-- You cannot use same id name twice -->
    <!-- id ===== attribute. quotation-> "" ======== value -->
    <div id="number-one">
      <p>This is another paragraph.</p>
    </div>
    <br />

    <div id="number-two">
      <span>This is a span.</span>
    </div>

    <br />

    <div>
      <p id="number-three">This is a paragraph.</p>
    </div>
    <br />

    <!-- To use Element selector: write the element name -->
    <div>
      <h1>This is an h1 element.</h1>
    </div>

    <div class="my-form">
      <input type="text" placeholder="This is text input" />
      <input type="password" placeholder="This is password input" />
    </div>
  </body>
</html>
